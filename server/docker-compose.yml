services:
  postgres:
    image: postgres:16-alpine
    container_name: habit_tracker_postgres
    restart: unless-stopped
    ports:
      - '5435:5432'
    environment:
      POSTGRES_USER: habit_tracker
      POSTGRES_PASSWORD: habit_tracker
      POSTGRES_DB: habit_tracker
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U habit_tracker -d habit_tracker']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
